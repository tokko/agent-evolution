<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="5">
<title>agent-evolution — board</title>
<style>
  * { box-sizing: border-box; }
  body { font: 14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif; margin: 0; background: #f5f5f5; color: #222; }
  header { background: #1a1a1a; color: #eee; padding: 10px 16px; display: flex; align-items: center; gap: 16px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header form { margin-left: auto; display: flex; gap: 6px; }
  header input, header textarea, header button { font: inherit; padding: 6px 10px; border-radius: 4px; border: 1px solid #333; }
  header input, header textarea { background: #2a2a2a; color: #eee; }
  header button { background: #4a9; color: #fff; border-color: #4a9; cursor: pointer; }
  main { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px; }
  .col { background: #e8e8e8; border-radius: 6px; padding: 8px; min-height: 70vh; }
  .col h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin: 4px 0 8px; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .card a { color: #222; text-decoration: none; font-weight: 500; display: block; margin-bottom: 4px; }
  .card a:hover { text-decoration: underline; }
  .card small { color: #888; font-size: 11px; }
  .moves { display: flex; gap: 4px; margin-top: 6px; }
  .moves form { margin: 0; }
  .moves button { font: inherit; font-size: 11px; padding: 2px 6px; border: 1px solid #bbb; background: #f5f5f5; border-radius: 3px; cursor: pointer; }
  .moves button:hover { background: #fff; }
  .col--done { background: #e0eee0; }
  .col--failed { background: #eedcdc; }
</style>
</head>
<body>
<header>
  <h1>agent-evolution</h1>
  <form method="post" action="/tasks">
    <input name="title" placeholder="New task title" required style="width:260px">
    <input name="body" placeholder="(optional) body" style="width:260px">
    <button type="submit">add</button>
  </form>
</header>
<main>
  {{range $col := .Columns}}
  <section class="col col--{{.Name}}">
    <h2>{{.Name}} <small>({{len .Tasks}})</small></h2>
    {{range .Tasks}}
    <div class="card">
      <a href="/tasks/{{.ID}}">#{{.ID}} {{.Title}}</a>
      <small>{{fmtTime .UpdatedAt}}</small>
      <div class="moves">
        {{if $col.Prev}}<form method="post" action="/tasks/{{.ID}}/move"><input type="hidden" name="to" value="{{$col.Prev}}"><button>&larr; {{$col.Prev}}</button></form>{{end}}
        {{if $col.Next}}<form method="post" action="/tasks/{{.ID}}/move"><input type="hidden" name="to" value="{{$col.Next}}"><button>{{$col.Next}} &rarr;</button></form>{{end}}
      </div>
    </div>
    {{end}}
  </section>
  {{end}}
</main>
</body>
</html>
